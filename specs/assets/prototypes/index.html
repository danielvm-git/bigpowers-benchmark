<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigPowers-Benchmark</title>
<style>
  :root {
    /* Dark mode tokens (canonical) - WCAG AA compliant */
    --bg: #0f1117;
    --bg-1: #141823;
    --surface: #161922;
    --surface-2: #1c2030;
    --border: #232838;
    --border-2: #2d3346;
    
    --fg: #e6e8ee;
    --fg-2: #b4bac9;
    --fg-3: #9ca3b3; /* Adjusted for 4.6:1 contrast */
    --fg-4: #7a8191; /* Adjusted for 4.5:1 contrast */
    
    --accent: #2dd4bf;
    --accent-d: #14b8a6;
    --accent-f: rgba(45,212,191,.12);
    --good: #34d399;
    --bad: #f87171;
    --warn: #fbbf24;
    
    --grid: rgba(255,255,255,0.04);
    --grid-2: rgba(255,255,255,0.07);
    
    --s-4: 4px;
    --s-8: 8px;
    --s-12: 12px;
    --s-16: 16px;
    --s-24: 24px;
    --s-32: 32px;
    
    --r-badge: 4px;
    --r-button: 6px;
    --r-card: 8px;
    --r-pill: 9999px;
    
    --shadow: 0 1px 0 rgba(255,255,255,.02) inset, 0 8px 24px rgba(0,0,0,.35);
    
    --t-fast: 120ms;
    --t-base: 200ms;
    --t-slow: 320ms;
  }
  
  [data-theme="light"] {
    --bg: #ffffff;
    --bg-1: #f8f9fa;
    --surface: #ffffff;
    --surface-2: #f1f3f5;
    --border: #e1e4e8;
    --border-2: #d1d5db;

    --fg-2: #4a5160;

    --fg-4: #9ca3af;
    
    --accent: #14b8a6;
    --accent-d: #0d9488;
    --accent-f: rgba(20,184,166,.12);
    --good: #10b981;
    --bad: #ef4444;
    --warn: #f59e0b;
    
    --grid: rgba(0,0,0,0.04);
    --grid-2: rgba(0,0,0,0.07);
    
    --shadow: 0 1px 0 rgba(0,0,0,.03) inset, 0 8px 24px rgba(0,0,0,.08);
  }
  
  /* Theme: Monochrome - Pure grayscale */
  [data-theme="mono"] {

  /* Theme: Ember - Warm orange/red */

    --bg-1: #231612;

  /* Theme: Violet - Rich purple */
  [data-theme="violet"] {
    --bg: #14091a;

    --surface: #25172e;
    --surface-2: #31213d;

  }
  
  /* Theme: Midnight - Deep navy */
  [data-theme="midnight"] {
    --bg: #0b0e1a;
    --bg-1: #111528;
    --surface: #161c33;
    --surface-2: #1e2640;
    --border: #252f4d;
    --border-2: #303c5f;
    
    --fg: #e5e9ff;
    --fg-2: #b8c2e8;
    --fg-3: #8f9dcf;
    --fg-4: #6b7ab6;
    
    --accent: #818cf8;
    --accent-d: #6366f1;
    --accent-f: rgba(129,140,248,.12);
    --good: #34d399;
    --bad: #f87171;
    --warn: #fbbf24;
    
    --grid: rgba(129,140,248,0.04);
    --grid-2: rgba(129,140,248,0.07);
    
    --shadow: 0 1px 0 rgba(129,140,248,.02) inset, 0 8px 24px rgba(0,0,0,.5);
  }
  
  /* Theme: Crimson - Deep red */
  [data-theme="crimson"] {
    --bg: #1a0a0e;
    --bg-1: #231115;
    --surface: #2d171d;
    --surface-2: #3d2128;
    --border: #4d2a32;
    --border-2: #603641;
    
    --fg: #ffecf0;
    --fg-2: #f5c5d1;
    --fg-3: #dfa0b0;
    --fg-4: #c97d90;
    
    --accent: #fb7185;
    --accent-d: #f43f5e;
    --accent-f: rgba(251,113,133,.12);
    --good: #34d399;
    --bad: #ef4444;
    --warn: #fbbf24;
    
    --grid: rgba(251,113,133,0.04);
    --grid-2: rgba(251,113,133,0.07);
    
    --shadow: 0 1px 0 rgba(251,113,133,.02) inset, 0 8px 24px rgba(0,0,0,.5);
  }
  
  /* Theme: Slate - Cool gray with blue tint */
  [data-theme="slate"] {
    --bg: #0f1419;
    --bg-1: #151b23;
    --surface: #1a222d;
    --surface-2: #222d3a;
    --border: #2a3847;
    --border-2: #354557;
    
    --fg: #e8ecf2;
    --fg-2: #b8c5d6;
    --fg-3: #90a0ba;
    --fg-4: #6b7c9e;
    
    --accent: #64748b;
    --accent-d: #475569;
    --accent-f: rgba(100,116,139,.15);
    --good: #34d399;
    --bad: #f87171;
    --warn: #fbbf24;
    
    --grid: rgba(100,116,139,0.05);
    --grid-2: rgba(100,116,139,0.08);
    
    --shadow: 0 1px 0 rgba(100,116,139,.03) inset, 0 8px 24px rgba(0,0,0,.45);
  }
  
  /* Theme: Amber - Warm gold */
  [data-theme="amber"] {
    --bg: #1a1508;
    --bg-1: #231d0f;
    --surface: #2d2616;
    --surface-2: #3a3120;
    --border: #4a3d28;
    --border-2: #5d4d35;
    
    --fg: #fffaeb;
    --fg-2: #f5e5b8;
    --fg-3: #e0cf8f;
    --fg-4: #c9b96b;
    
    --accent: #fbbf24;
    --accent-d: #f59e0b;
    --accent-f: rgba(251,191,36,.12);
    --good: #34d399;
    --bad: #f87171;
    --warn: #fb923c;
    
    --grid: rgba(251,191,36,0.04);
    --grid-2: rgba(251,191,36,0.07);
    
    --shadow: 0 1px 0 rgba(251,191,36,.02) inset, 0 8px 24px rgba(0,0,0,.5);
  }
  
  /* Theme: Rose - Soft pink */
  [data-theme="rose"] {
    --bg: #1a0d14;
    --bg-1: #23141c;
    --surface: #2d1a26;
    --surface-2: #3a2332;
    --border: #4a2d3f;
    --border-2: #5d3a50;
    
    --fg: #fff0f6;
    --fg-2: #f5c9dd;
    --fg-3: #dfa3c0;
    --fg-4: #c97ea3;
    
    --accent: #f472b6;
    --accent-d: #ec4899;
    --accent-f: rgba(244,114,182,.12);
    --good: #34d399;
    --bad: #f87171;
    --warn: #fbbf24;
    
    --grid: rgba(244,114,182,0.04);
    --grid-2: rgba(244,114,182,0.07);

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    height: 100vh;
  }
  
  .app-container {
    display: flex;
    height: 100vh;
  }
  
  /* Sidebar */
  .sidebar {
    width: 200px;
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width var(--t-base) ease, transform var(--t-base) ease;
  }
  
  .sidebar.collapsed {
    width: 60px;
  }
  
  .sidebar-header {
    padding: var(--s-16);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 52px;
  }
  
  .wordmark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
  }
  
  .sidebar.collapsed .wordmark {
    opacity: 0;
  }
  
  .collapse-btn {
    background: none;
    border: none;
    color: var(--fg-3);
    cursor: pointer;
    padding: var(--s-4);
    border-radius: var(--r-badge);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--t-fast) ease;
  }
  
  .collapse-btn:hover {
    background: var(--surface);
    color: var(--fg);
  }
  
  .sidebar-nav {
    flex: 1;
    padding: var(--s-8);
    overflow-y: auto;
  }
  
  .nav-item {
    display: flex;
    align-items: center;
    gap: var(--s-12);
    padding: var(--s-8) var(--s-12);
    border-radius: var(--r-button);
    color: var(--fg-2);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: all var(--t-fast) ease;
    cursor: pointer;
    margin-bottom: var(--s-4);
    white-space: nowrap;
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
  }
  
  .nav-item:hover {
    background: var(--surface);
    color: var(--fg);
  }
  
  .nav-item.active {
    background: var(--accent-f);
    color: var(--accent);
  }
  
  .nav-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  
  .sidebar.collapsed .nav-item {
    justify-content: center;
    padding: var(--s-8);
  }
  
  .sidebar.collapsed .nav-label {
    display: none;
  }
  
  /* Main content */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  /* Title bar */
  .title-bar {
    height: 52px;
    background: rgba(22, 25, 34, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--s-24);
    flex-shrink: 0;
  }
  
  [data-theme="light"] .title-bar {
    background: rgba(255, 255, 255, 0.8);
  }
  
  .title-bar-left {
    display: flex;
    align-items: center;
    gap: var(--s-12);
  }
  
  .title-bar-center {
    font-size: 18px;
    font-weight: 600;
    color: var(--fg);
  }
  
  .title-bar-right {
    display: flex;
    align-items: center;
    gap: var(--s-16);
  }
  
  .status-indicator {
    display: flex;
    align-items: center;
    gap: var(--s-8);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-3);
  }
  
  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  
  .pulse-dot.running {
    background: var(--warn);
    animation: pulse 2s ease infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  
  @media (prefers-reduced-motion: reduce) {
    .pulse-dot.running {
      animation: none;
      opacity: 0.7;
    }
    * {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }
  
  /* Focus indicators for keyboard navigation */
  .nav-item:focus-visible,
  .icon-btn:focus-visible,
  .collapse-btn:focus-visible,
  .btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  
  .icon-btn {
    background: none;
    border: none;
    color: var(--fg-3);
    cursor: pointer;
    padding: var(--s-8);
    border-radius: var(--r-badge);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--t-fast) ease;
  }
  
  .icon-btn:hover {
    background: var(--surface);
    color: var(--fg);
  }
  
  /* Content area */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: var(--s-24);
    background: var(--bg);
  }
  
  /* Buttons */
  .btn {
    font-size: 13px;
    font-weight: 500;
    padding: var(--s-8) var(--s-16);
    border-radius: var(--r-button);
    border: none;
    cursor: pointer;
    transition: all var(--t-fast) ease;
    display: inline-flex;
    align-items: center;
    gap: var(--s-8);
    white-space: nowrap;
  }
  
  .btn-primary {
    background: var(--accent);
    color: #0f1117;
  }
  
  .btn-primary:hover {
    background: var(--accent-d);
  }
  
  .btn-primary:active {
    transform: scale(0.98);
  }
  
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-2);
  }
  
  .btn-ghost:hover {
    background: var(--surface);
    border-color: var(--border-2);
    color: var(--fg);
  }
  
  .btn-destructive {
    background: var(--bad);
    color: white;
  }
  
  .btn-destructive:hover {
    background: #dc2626;
  }
  
  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: var(--s-24);
    box-shadow: var(--shadow);
  }
  
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: var(--s-16);
    box-shadow: var(--shadow);
  }
  
  .metric-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--fg-3);
    margin-bottom: var(--s-8);
  }
  
  .metric-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--fg);
    margin-bottom: var(--s-12);
  }
  
  .sparkline {
    width: 100%;
    height: 32px;
    margin-bottom: var(--s-8);
  }
  
  .delta-badge {
    display: inline-flex;
    align-items: center;
    gap: var(--s-4);
    padding: var(--s-4) var(--s-8);
    border-radius: var(--r-pill);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
  }
  
  .delta-good {
    background: rgba(52,211,153,.12);
    color: var(--good);
  }
  
  .delta-bad {
    background: rgba(248,113,113,.12);
    color: var(--bad);
  }
  
  .delta-neutral {
    background: var(--surface-2);
    color: var(--fg-3);
  }
  
  /* Utility */
  .hidden {
    display: none !important;
  }
  
  /* Screen reader only */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }
  
  /* Screen-specific styles loaded per screen */
</style>
</head>
<body>

<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" role="complementary" aria-label="Application sidebar">
    <div class="sidebar-header">
      <div class="wordmark" aria-label="BigPowers Benchmark">BigPowers</div>
      <button class="collapse-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar" aria-expanded="true" id="sidebarToggle">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M10 4L6 8l4 4"/>
        </svg>
      </button>
    </div>
    
    <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
      <button class="nav-item" data-screen="dashboard" onclick="navigateTo('dashboard')" aria-label="Dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </button>
      
      <button class="nav-item active" data-screen="mission-control" onclick="navigateTo('mission-control')" aria-label="Mission Control" aria-current="page">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9 8l6 4-6 4V8z" fill="var(--bg)"/>
        </svg>
        <span class="nav-label">Mission Control</span>
      </button>
      
      <button class="nav-item" data-screen="run-explorer" onclick="navigateTo('run-explorer')" aria-label="Run Explorer">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Run Explorer</span>
      </button>
      
      <button class="nav-item" data-screen="skill-insights" onclick="navigateTo('skill-insights')" aria-label="Skill Insights">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>

<script>
  const screens = {
    'dashboard': 'dashboard.html',
    'mission-control': 'mission-control.html',
    'run-explorer': 'run-explorer.html',
    'skill-insights': 'skill-insights.html',
    'model-health': 'model-health.html',
    'task-library': 'task-library.html',
    'settings': 'settings.html',
    'analytics': 'analytics.html'
  };
  
  const screenTitles = {
    'dashboard': 'Dashboard',
    'mission-control': 'Mission Control',
    'run-explorer': 'Run Explorer',
    'skill-insights': 'Skill Insights',
    'model-health': 'Model Health',
    'task-library': 'Task Library',
    'settings': 'Settings & Model Registry',
    'analytics': 'Analytics'
  };
  
  function navigateTo(screen) {
    // Update active nav item
    document.querySelectorAll('.nav-item').forEach(item => {
      item.classList.remove('active');
      item.removeAttribute('aria-current');
    });
    const activeItem = document.querySelector(`[data-screen="${screen}"]`);
    activeItem.classList.add('active');
    activeItem.setAttribute('aria-current', 'page');
    
    // Update title
    document.getElementById('screenTitle').textContent = screenTitles[screen];
    
    // Announce navigation to screen readers
    const announcement = document.createElement('div');
    announcement.setAttribute('role', 'status');
    announcement.setAttribute('aria-live', 'polite');
    announcement.className = 'sr-only';
    announcement.textContent = `Navigated to ${screenTitles[screen]}`;
    document.body.appendChild(announcement);
    setTimeout(() => announcement.remove(), 1000);
    
    // Load screen content
    fetch(screens[screen])
      .then(response => response.text())
      .then(html => {
        document.getElementById('contentArea').innerHTML = html;
        // Initialize screen if needed
        if (window[`init${screen.replace(/-/g, '')}Screen`]) {
          window[`init${screen.replace(/-/g, '')}Screen`]();
        }
      })
      .catch(error => {
        document.getElementById('contentArea').innerHTML = `<div style="padding: 32px; text-align: center; color: var(--fg-3);">Screen loading...</div>`;
      });
  }
  
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const toggle = document.getElementById('sidebarToggle');
    const isCollapsed = sidebar.classList.toggle('collapsed');
    toggle.setAttribute('aria-expanded', !isCollapsed);
    toggle.setAttribute('aria-label', isCollapsed ? 'Expand sidebar' : 'Collapse sidebar');
  }
  
  function toggleTheme() {
    const root = document.documentElement;
    const current = root.getAttribute('data-theme');
    root.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
  }
  
  // Global theme change function (called from settings.html)
  window.changeTheme = function(theme) {
    const root = document.documentElement;
    if (theme === 'auto') {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      root.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    } else {
      root.setAttribute('data-theme', theme);
    }
    // Store preference
    localStorage.setItem('theme', theme);
  };
  
  // Apply saved theme on load
  (function() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      window.changeTheme(savedTheme);
    }
  })();
  
  // Load initial screen
  navigateTo('mission-control');
</script>

</body>
