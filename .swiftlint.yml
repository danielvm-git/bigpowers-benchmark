included:
  - Sources
  - Tests

excluded:
  - .build
  - project

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
  - sorted_imports

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 300
  error: 400
